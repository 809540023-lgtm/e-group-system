name: 自動部署到 Render

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 檢出代碼
        uses: actions/checkout@v3

      - name: 部署後端 API
        run: |
          curl -X POST https://api.render.com/v1/services \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "hualiang-api",
              "ownerId": "${{ secrets.RENDER_OWNER_ID }}",
              "type": "web_service",
              "environmentId": "python3",
              "repo": "https://github.com/809540023-lgtm/e-group-system.git",
              "repoBranch": "main",
              "rootDir": "hualiang-app/backend",
              "buildCommand": "pip install -r requirements.txt",
              "startCommand": "gunicorn -w 4 -b 0.0.0.0:$PORT app:create_app()",
              "envVars": [
                {"key": "FLASK_ENV", "value": "production"},
                {"key": "FLASK_DEBUG", "value": "False"},
                {"key": "SECRET_KEY", "value": "hualiang-2025-secret-key-production"}
              ]
            }'

      - name: 部署前端應用
        run: |
          curl -X POST https://api.render.com/v1/services \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "hualiang-frontend",
              "ownerId": "${{ secrets.RENDER_OWNER_ID }}",
              "type": "static_site",
              "repo": "https://github.com/809540023-lgtm/e-group-system.git",
              "repoBranch": "main",
              "rootDir": "hualiang-app/frontend",
              "buildCommand": "npm install && npm run build",
              "publishDirectory": "dist",
              "envVars": [
                {"key": "VITE_API_URL", "value": "https://hualiang-api.onrender.com/api"}
              ]
            }'

      - name: 部署管理後台
        run: |
          curl -X POST https://api.render.com/v1/services \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "hualiang-admin",
              "ownerId": "${{ secrets.RENDER_OWNER_ID }}",
              "type": "static_site",
              "repo": "https://github.com/809540023-lgtm/e-group-system.git",
              "repoBranch": "main",
              "rootDir": "hualiang-app/admin",
              "buildCommand": "npm install && npm run build",
              "publishDirectory": "dist",
              "envVars": [
                {"key": "VITE_API_URL", "value": "https://hualiang-api.onrender.com/api"}
              ]
            }'

      - name: 部署完成
        run: echo "✅ 應用已自動部署到 Render！"
